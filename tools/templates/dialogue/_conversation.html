<div id="chat-history" style="display:flex;flex-direction:column;gap:0.6rem;margin-bottom:1rem">
  {% for turn in session.turns %}
  <div style="display:flex;flex-direction:column;gap:0.35rem">
    <div style="align-self:flex-end;max-width:75%;background:var(--pico-card-background-color);border:1px solid var(--pico-muted-border-color);border-radius:8px 8px 2px 8px;padding:0.5rem 0.75rem;font-size:0.875rem">
      {{ turn.player_input }}
    </div>
    <div style="align-self:flex-start;max-width:75%;background:#1a2a1a;border:1px solid #2a4a2a;border-radius:8px 8px 8px 2px;padding:0.5rem 0.75rem;font-size:0.875rem;color:#c8f7c8">
      <strong style="font-size:0.7rem;color:#7ef7a8;display:block;margin-bottom:0.2rem">{{ npc.name }}</strong>
      {{ turn.npc_response }}
    </div>
  </div>
  {% endfor %}
</div>

{% if session.menu_options %}
<div id="menu-options" style="display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:0.75rem">
  {% for opt in session.menu_options %}
  <button style="font-size:0.8rem;padding:0.25rem 0.6rem;background:var(--pico-card-background-color);border:1px solid var(--pico-muted-border-color);border-radius:4px;cursor:pointer"
          hx-post="/dialogue/{{ npc.id }}/send"
          hx-target="#conversation"
          hx-swap="outerHTML"
          hx-vals='{"player_input": "{{ opt|replace('"', '&quot;') }}"}'>
    {{ opt }}
  </button>
  {% endfor %}
</div>
{% endif %}

<form hx-post="/dialogue/{{ npc.id }}/send"
      hx-target="#conversation"
      hx-swap="outerHTML"
      style="display:flex;gap:0.5rem;margin:0">
  <input type="text" name="player_input"
         placeholder="Say something…"
         style="flex:1;margin:0;font-size:0.875rem"
         autocomplete="off"
         autofocus>
  <button type="submit" style="margin:0;padding:0.4rem 1rem;font-size:0.875rem">Send</button>
</form>
