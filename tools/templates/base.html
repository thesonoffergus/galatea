<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Galatea Dev Tools{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css">
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <style>
    body { max-width: 100%; padding: 0; }
    header { padding: 0.5rem 1.5rem; border-bottom: 1px solid var(--pico-muted-border-color); }
    header nav { display: flex; gap: 1.5rem; align-items: center; }
    header nav a { text-decoration: none; font-weight: 500; color: var(--pico-muted-color); }
    header nav a.active, header nav a:hover { color: var(--pico-color); }
    header .brand { font-weight: 700; font-size: 1.1rem; color: var(--pico-color); margin-right: 1rem; }
    .layout { display: grid; grid-template-columns: 260px 1fr; gap: 0; height: calc(100vh - 52px); overflow: hidden; }
    .sidebar { overflow-y: auto; border-right: 1px solid var(--pico-muted-border-color); padding: 1rem; }
    .sidebar h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--pico-muted-color); margin-bottom: 0.5rem; }
    .detail-pane { overflow-y: auto; padding: 1.25rem 1.5rem; }
    .sidebar ul { list-style: none; padding: 0; margin: 0; }
    .sidebar li a { display: block; padding: 0.35rem 0.5rem; border-radius: 4px; text-decoration: none; color: var(--pico-color); font-size: 0.875rem; }
    .sidebar li a:hover, .sidebar li a.active { background: var(--pico-card-background-color); }
    .badge { display: inline-block; padding: 0.1em 0.45em; border-radius: 9999px; font-size: 0.7rem; font-weight: 600; line-height: 1.4; }
    .badge-tier0 { background: #444; color: #ccc; }
    .badge-tier1 { background: #1a3a5c; color: #7eb8f7; }
    .badge-tier2 { background: #1a4a2a; color: #7ef7a8; }
    .badge-tier3 { background: #4a2a00; color: #f7c87e; }
    .badge-player { background: #3a1a5c; color: #c87ef7; }
    .badge-tag { background: var(--pico-card-background-color); color: var(--pico-muted-color); font-size: 0.7rem; padding: 0.1em 0.4em; border-radius: 4px; border: 1px solid var(--pico-muted-border-color); }
    .badge-gatherable { background: #1a3a1a; color: #7ef77e; }
    .badge-craftable { background: #1a2a4a; color: #7eaaf7; }
    .tag-cloud { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 0.75rem; }
    .action-list { list-style: none; padding: 0; margin: 0; }
    .action-list li { padding: 0.25rem 0; font-size: 0.875rem; color: var(--pico-muted-color); }
    .action-list li strong { color: var(--pico-color); }
    table { font-size: 0.85rem; }
    .placeholder { color: var(--pico-muted-color); padding: 3rem; text-align: center; }
    .msg-success { color: #7ef7a8; }
    .msg-error { color: #f77e7e; }
    details summary { cursor: pointer; }
    .big-five-row { display: grid; grid-template-columns: 130px 1fr 40px; align-items: center; gap: 0.5rem; margin-bottom: 0.3rem; font-size: 0.8rem; }
    .big-five-row progress { margin: 0; }
    .skill-row { display: grid; grid-template-columns: 140px 1fr 40px; align-items: center; gap: 0.5rem; margin-bottom: 0.3rem; font-size: 0.8rem; }
    .section-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--pico-muted-color); margin: 1rem 0 0.35rem; }
    .htmx-indicator { opacity: 0; transition: opacity 0.2s; }
    .htmx-request .htmx-indicator { opacity: 1; }
    .empty { color: var(--pico-muted-color); font-style: italic; font-size: 0.875rem; }
    .tree-node { margin-left: 1.25rem; }
    .tree-node > details { margin: 0.2rem 0; }
    .tree-node > details > summary { font-size: 0.875rem; }
  </style>
</head>
<body>
<header>
  <nav>
    <span class="brand">Galatea</span>
    <a href="/world/" {% if active == 'world' %}class="active"{% endif %}>World</a>
    <a href="/npc/" {% if active == 'npc' %}class="active"{% endif %}>NPCs</a>
    <a href="/dag/" {% if active == 'dag' %}class="active"{% endif %}>Product DAG</a>
    <a href="/seed/" {% if active == 'seed' %}class="active"{% endif %}>Scenarios</a>
    <a href="/dialogue/" {% if active == 'dialogue' %}class="active"{% endif %}>Dialogue</a>
    <a href="/knowledge/" {% if active == 'knowledge' %}class="active"{% endif %}>KB</a>
    <a href="/events/" {% if active == 'events' %}class="active"{% endif %}>Events</a>
    <a href="/tick/" {% if active == 'tick' %}class="active"{% endif %}>Tick</a>
    <a href="/prompts/" {% if active == 'prompts' %}class="active"{% endif %}>Prompts</a>
  </nav>
</header>
{% block content %}{% endblock %}
</body>
</html>
